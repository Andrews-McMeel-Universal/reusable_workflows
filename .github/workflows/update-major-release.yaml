name: Update Major Release

run-name: Update major release to ${{ github.event.inputs.target || github.event.release.name }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: The tag or reference to use
        required: true
      major_version:
        type: choice
        description: The major version to update
        options:
          - "2"
          - "1"
      environment:
        description: The environment to deploy to
        required: false
        default: production

jobs:
  tag:
    name: Tag major release
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_ACTION_CI }}

      - name: Git config
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Get target
        run: 
          echo "TARGET=$(echo "${{ github.event.inputs.target || github.event.release.name }}" | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Get major version
        run: |
          if [[ -z "${{ github.event.inputs.major_version }}" ]]; then
            echo "MAJOR_VERSION=$(echo "${{ github.event.release.name }}" | cut -d. -f1)" >> $GITHUB_ENV
          else 
            echo "MAJOR_VERSION=${{ github.event.inputs.major_version }}" >> $GITHUB_ENV
          fi

      - name: Tag new target
        run: |
          git tag -f ${{ env.MAJOR_VERSION }} ${{ env.TARGET }}
          git tag -f latest ${{ env.TARGET }}

      - name: Push new tag
        run: |
          git push origin ${{ env.MAJOR_VERSION }} --force
          git push origin latest --force

      - name: Check if JIRA_TOKEN is set
        run: |
          if [[ -n "${{ secrets.JIRA_TOKEN }}" ]]; then
            echo "JIRA_TOKEN_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Link release in Jira tickets
        if: ${{ env.JIRA_TOKEN_EXISTS == 'true' }}
        continue-on-error: true
        uses: Andrews-McMeel-Universal/link-jira-versions@latest
        with:
          JIRA_AUTOMATIONS_EMAIL: ${{ vars.JIRA_AUTOMATIONS_EMAIL }}
          JIRA_AUTOMATIONS_DOMAIN: ${{ vars.JIRA_AUTOMATIONS_DOMAIN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}