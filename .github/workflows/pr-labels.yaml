name: Add PR Labels

on:
  workflow_call:
    secrets:
      PAT_ACTION_CI:
        required: true

jobs:
  # Automatically apply labels that match globs, defined in .github/labeler.yml
  # https://github.com/marketplace/actions/labeler
  triage-labels:
    name: Apply labels
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
        with:
          repo-token: ${{ secrets.PAT_ACTION_CI }}
          sync-labels: true

  # Prevent merging if certain labels exist
  # https://github.com/marketplace/actions/require-labels
  check-required-labels:
    name: Check for "do not merge" label
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe
        with:
          mode: exactly
          count: 0
          labels: "do not merge"
