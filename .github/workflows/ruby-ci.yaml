name: Ruby on Rails Application CI

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        description: "The environment to use for the CI"
        default: ${{ vars.APPLICATION_CI_ENVIRONMENT || 'development' }}
      APT_PACKAGES:
        required: false
        type: string
        default: ${{ vars.APPLICATION_CI_APT_PACKAGES || 'curl' }}
        description: "Apt packages to install"
      INSTALL_NODE:
        required: false
        type: string
        description: "Whether to install Node.js or not"
        default: 'false'
      NODE_VERSION:
        required: false
        type: string
        description: "Node.js version to install"
        default: "14"
      GITHUB_RUNNER:
        required: false
        type: string
        description: "The type of runner to use"
        default: ${{ vars.CUSTOM_GITHUB_RUNNER || 'ubuntu-latest' }}
      HEALTHCHECK_URL:
        required: false
        type: string
        description: "URL to use for healthcheck"
        default: ${{ vars.HEALTHCHECK_URL || 'http://localhost:3000/health' }}
      GIT_CHECKOUT_SUBMODULES:
        required: false
        type: string
        description: "Check out submodules"
        default: ${{ vars.GIT_CHECKOUT_SUBMODULES }}
      WEBPACK_ASSET_PRECOMPILATION:
        required: false
        type: string
        description: "Run webpack asset precompilation step"
        default: ${{ vars.APPLICATION_CI_WEBPACK_PRECOMPILATION || 'false' }}
      YARN_INSTALL:
        required: false
        type: string
        default: ${{ vars.APPLICATION_CI_YARN_INSTALL || 'false' }}
    secrets:
      AZURE_CREDENTIALS:
        required: true
      PAT_ACTION_CI:
        required: false

env:
  RAILS_ENV: ${{ inputs.environment }}

jobs:
  build:
    name: Build and Test
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ${{ inputs.GITHUB_RUNNER }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: ${{ inputs.GIT_CHECKOUT_SUBMODULES }}
          token: ${{ secrets.PAT_ACTION_CI || github.token }}

      - name: Use .env cache action
        uses: Andrews-McMeel-Universal/get-envs@v1
        with:
          azurecredentials: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ inputs.environment }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: ${{ inputs.INSTALL_NODE == 'true' }}
        with:
          node-version: ${{ inputs.NODE_VERSION }}

      - name: Install apt packages
        run: sudo apt-get update -y && sudo apt-get install -y ${{ inputs.APT_PACKAGES }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601
        with:
          bundler-cache: true

      - name: Run Yarn Install
        if: ${{ inputs.YARN_INSTALL != 'false' }}
        uses: Andrews-McMeel-Universal/cache-yarn-install@v1
        with:
          enable-corepack: false

      - name: Run Webpack Asset Precompilation
        if: ${{ inputs.WEBPACK_ASSET_PRECOMPILATION != 'false' }}
        run: bundle exec rake assets:precompile

      - name: Boot Rails server
        run: |
          bundle exec rails s -b 0.0.0.0 -p 3000 &
          PID=$!
          sleep 10
          HEALTHCHECK_URL="${{ inputs.HEALTHCHECK_URL }}"
          if [[ "${HEALTHCHECK_URL}" == *","* ]]; then
            IFS=',' read -ra URLS <<< "${HEALTHCHECK_URL}"
          else
            URLS=("${HEALTHCHECK_URL}")
          fi
          for URL in "${URLS[@]}"; do
            echo "Checking healthcheck URL: ${URL}"
            for i in {1..5}; do
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}")
              if [[ "$STATUS_CODE" -eq 200 ]]; then
                echo "✅ [PASSED] Healthcheck passed for ${URL}" | tee -a $GITHUB_STEP_SUMMARY
                break
              else
                echo "❌ [FAILED] Healthcheck not ready yet for ${URL} (status: $STATUS_CODE). Retrying in 2 seconds..." | tee -a $GITHUB_STEP_SUMMARY
                sleep 2
              fi
              if [[ $i -eq 5 ]]; then
                echo "❌ [FAILED] Healthcheck failed for ${URL} after multiple attempts." | tee -a $GITHUB_STEP_SUMMARY
                kill -2 $PID
                exit 1
              fi
            done
          done
          sleep 10
          if [[ $(ps -p $PID) ]] ; then 
            kill -2 $PID
            exit 0
          else
            echo "App failed to start."
            exit 1
          fi
