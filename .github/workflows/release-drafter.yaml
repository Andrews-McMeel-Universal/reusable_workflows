name: 📄 Create Release Draft

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_call:
    secrets:
      PAT_ACTION_CI:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release-draft:
    name: Update Release Draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check release drafter config version
        run: |
          if grep 'when' .github/release-drafter.yml >/dev/null; then
            LATEST_RELEASE_DRAFTER_SCHEMA=true
            echo "latestReleaseDrafterSchema=${LATEST_RELEASE_DRAFTER_SCHEMA}" >> "$GITHUB_ENV"
          fi

      - name: Draft Release Notes using v6 of action
        if: env.latestReleaseDrafterSchema != 'true'
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_ACTION_CI }}

      - name: Draft Release Notes using v7 of action
        if: env.latestReleaseDrafterSchema == 'true'
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_ACTION_CI }}