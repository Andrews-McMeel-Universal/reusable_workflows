name: Generate TypeScript Types

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deploy Environment.  This is used to pull in and set the github environment. Can be development, staging, or production."
      corepackInstall:
        required: false
        type: string
        default: ${{ vars.APPLICATION_CI_COREPACK_INSTALL || 'true' }}
      typescriptServiceDomain:
        required: false
        type: string
        default: ${{ vars.TYPESCRIPT_SERVICE_DOMAIN }}
      typescriptSchemaPrefix:
        required: false
        type: string
        default: ${{ vars.TYPESCRIPT_SCHEMA_PREFIX }}
      lintFormatter:
        required: false
        type: string
        default: ${{ vars.APPLICATION_CI_LINT_FORMATTER || 'false' }}
    secrets:
      PAT_ACTION_CI:
        required: false

jobs:
  generate-typescript:
    name: Generate TypeScript Types
    runs-on: azure
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ACTION_CI }}
          fetch-depth: 0

      - name: Use cache-yarn-install action
        uses: Andrews-McMeel-Universal/cache-yarn-install@v1
        with:
          enable-corepack: ${{ inputs.corepackInstall }}

      - name: Generate TypeScript Types
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SERVICE_URL: ${{ inputs.typescriptServiceDomain }}
        run: |
          if [[ "${ENVIRONMENT}" != "production" ]]; then
            SERVICE_URL="${ENVIRONMENT}.${SERVICE_URL}"
          fi
          VERSIONS=("v1" "v2" "v3" "v4" "v5")
          for VERSION in "${VERSIONS[@]}"; do
            SWAGGER_URL="https://${SERVICE_URL}/swagger/${VERSION}/swagger.json"
            RESPONSE=$(curl -o /dev/null -s -w "%{http_code}\n" "${SWAGGER_URL}")
            if [[ "$RESPONSE" -ne 200 ]]; then
              echo "Swagger version not available. Skipping version: ${VERSION}"
              continue
            fi
            yarn openapi-typescript "${SWAGGER_URL}" -o ./src/types/schemas/${{ inputs.typescriptSchemaPrefix }}AdminSchema.${ENVIRONMENT}.${VERSION}.d.ts
          done

      - name: Run prettier
        if: ${{ inputs.lintFormatter == 'true' }}
        run: yarn format

      - name: Generate TypeScript Build ID
        id: build_id
        run: echo "BUILD_ID=$(date +%s)" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "updated typescript definitions for the `${{ inputs.environment }}` environment"
          branch: maintenance/typescript/${{ inputs.environment }}-types-${{ env.BUILD_ID }}
          committer: AMU Automations <amu_deploy@amuniversal.com>
          token: ${{ secrets.PAT_ACTION_CI }}
          git-token: ${{ secrets.PAT_ACTION_CI }}
          author: AMU Automations <amu_deploy@amuniversal.com>
          delete-branch: true
          title: "chore: update typescript definitions for the `${{ inputs.environment }}` environment"
          body: |
            Updating TypeScript types for `${{ inputs.environment }}` environment in response to changes in the API or data structures.
            
            This ensures that our TypeScript definitions remain accurate and up-to-date, providing better type safety and developer experience.
          labels: |
            maintenance
